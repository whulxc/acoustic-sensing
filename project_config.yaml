project_name: acoustic-sensing
project_root: <repository-root>
data_policy:
  default_data_root: data/example
  repository_data_dir: data/example
  included_example_data:
    - data/example/Record.mat
  keep_large_text_dump_out_of_git: true
  ignored_large_inputs:
    - Record.txt
    - Sensors.txt
compute_policy:
  matlab_version_tested: R2022a
  requires_signal_processing_toolbox: true
